{"name": "Update Traffic Data", "on": {"schedule": [{"cron": "0 */12 * * *"}], "workflow_dispatch": null}, "jobs": {"update": {"runs-on": "ubuntu-latest", "steps": [{"name": "Checkout repo", "uses": "actions/checkout@v4"}, {"name": "Set up Python", "uses": "actions/setup-python@v5", "with": {"python-version": "3.11"}}, {"name": "Run update script", "env": {"OF_API_KEY": "${{ secrets.OF_API_KEY }}"}, "run": "python update.py"}, {"name": "Commit updated index.html", "run": "git config user.name \"github-actions[bot]\"\ngit config user.email \"github-actions[bot]@users.noreply.github.com\"\ngit add index.html\ngit diff --staged --quiet || git commit -m \"data: auto-update\"\ngit push"}]}}}
